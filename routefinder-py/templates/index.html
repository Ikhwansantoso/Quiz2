<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RouteFinder - Python Version</title>
    <link rel="stylesheet" href="/static/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header class="glass-panel header">
            <h1>RouteFinder</h1>
            <div class="header-controls">
                <button class="outline" id="btn-clear">Clear Map</button>
                <button class="primary" id="btn-solve">Find Evacuation Route</button>
            </div>
        </header>

        <main class="main-content">
            <aside class="glass-panel sidebar">
                <div class="control-group">
                    <h3>Tools</h3>
                    <button class="tool-button active" data-tool="wall">
                        <div class="tool-icon node-wall" style="width: 20px; height: 20px;"></div>
                        Draw Wall
                    </button>
                    <button class="tool-button" data-tool="fire">
                        <div class="tool-icon node-fire" style="width: 20px; height: 20px; font-size: 16px; display: flex; align-items: center; justify-content: center;"></div>
                        Draw Fire
                    </button>
                    <button class="tool-button" data-tool="eraser">
                        <div class="tool-icon" style="background: transparent; border: 1px dashed #fff; width: 20px; height: 20px;"></div>
                        Eraser
                    </button>
                </div>

                <div class="control-group">
                    <h3>Placement</h3>
                    <button class="tool-button" data-tool="start">
                        <div class="tool-icon node-start" style="width: 20px; height: 20px; font-size: 14px; display: flex; align-items: center; justify-content: center;"></div>
                        Move Start Pos
                    </button>
                    <button class="tool-button" data-tool="exit">
                        <div class="tool-icon node-exit" style="width: 20px; height: 20px; font-size: 14px; display: flex; align-items: center; justify-content: center;"></div>
                        Move Exit Pos
                    </button>
                </div>

                <div class="stats-panel">
                    <div class="stat-box">
                        <div class="stat-value" id="stat-distance">-</div>
                        <div class="stat-label">Steps (Distance)</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-value" id="stat-status">Ready</div>
                        <div class="stat-label">Status</div>
                    </div>
                </div>
            </aside>

            <section class="glass-panel grid-container">
                <!-- Javascript will generate grid inside this div -->
                <div id="grid" class="grid" onmouseleave="handleMouseLeave()"></div>

                <div class="legend-horizontal">
                    <div class="legend-item">
                        <div class="legend-icon node-start" style="width: 24px; height: 24px; font-size: 16px; display: flex; align-items: center; justify-content: center;"></div>
                        <span>Start</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-icon node-exit" style="width: 24px; height: 24px; font-size: 16px; display: flex; align-items: center; justify-content: center;"></div>
                        <span>Exit</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-icon node-wall" style="width: 24px; height: 24px;"></div>
                        <span>Wall</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-icon node-fire" style="width: 24px; height: 24px; font-size: 16px; display: flex; align-items: center; justify-content: center;"></div>
                        <span>Fire</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-icon node-path" style="width: 24px; height: 24px; animation: none; filter: drop-shadow(0 0 5px rgba(250, 204, 21, 0.8)); border-radius: 4px;"></div>
                        <span>Shortest Path</span>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <!-- Modal -->
    <div id="result-modal" class="modal-overlay hidden">
        <div class="modal-content glass-panel">
            <div id="modal-icon" class="modal-icon"></div>
            <h2 id="modal-title">Title</h2>
            <p id="modal-message">Message</p>
            <button class="primary" id="modal-close">OK</button>
        </div>
    </div>

    <!-- Panggil file javascript kita -->
    <script src="/static/script.js"></script>
</body>

</html>
